name: .NET Continuous Deployment

on:
  push:
    tags:
      - '*'

env:
  ProjectPath: ./RichillCapital.SharedKernel.csproj
  CakeFilePath: ./build.cake
  Target: Default
  Configuration: Release

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Nerdbank.GitVersioning to Set Version Variables
      uses: dotnet/nbgv@master
      id: nbgv

    - name: Update Version
      run: |
        sudo apt-get install -y xmlstarlet
        latest_tag=${{ steps.nbgv.outputs.SimpleVersion }}
        xmlstarlet ed --inplace -u "/Project/PropertyGroup/Version" -v "${latest_tag}" ${{ env.ProjectPath }}
        
    - name: .NET Build and Tests
      uses: cake-build/cake-action@v2
      with:
        script-path: ${{ env.CakeFilePath }}
        target: ${{ env.Target }}
        verbosity: Diagnostic
        arguments: |
        configuration: ${{ env.Configuration }}
    
    - name: Push to NuGet Gallery
      run: |
        dotnet nuget push ./artifacts/*.nupkg --source https://api.nuget.org/v3/index.json --api-key ${{ secrets.NUGET_API_KEY }}