name: RichillCapital.SharedKernel - Continuous Integration

on:
  push:
    branches:
      - master
      - dev

  pull_request:
    branches:
      - master
      - dev
env:
  PACKAGE_ID: RichillCapital.SharedKernel
  PROJECT_PATH: ./RichillCapital.SharedKernel.csproj
  CAKE_FILE_PATH: ./build.cake
  TARGET: Default
  CONFIGURATION: Debug

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    - name: Determine the build version
      id: version
      run: echo "::set-output name=version::$(git describe --tags --abbrev=0 || date +'%Y%m%d')-${{ github.sha }}"

