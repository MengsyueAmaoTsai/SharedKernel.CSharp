name: .NET Continuous Integration

on:
  push:
    branches:
      - master
      - dev

  pull_request:
    branches:
      - master
      - dev

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Nerdbank.GitVersioning to Set Version Variables
      uses: dotnet/nbgv@master
      id: nbgv

    - name: Update Package Version 
      run: |
        [xml]$manifest = Get-Content ".\$env:Wap_Project_Directory\Package.appxmanifest"

        $manifest.Package.Identity.Version = "${{ steps.nbgv.outputs.SimpleVersion }}.0"
        $manifest.save(".\$env:Wap_Project_Directory\Package.appxmanifest")

    - name: Update version in csproj
      run: |
        sudo apt-get install -y xmlstarlet
        latest_tag=${{ steps.nbgv.outputs.SimpleVersion }}
        xmlstarlet ed --inplace -u "/Project/PropertyGroup/Version" -v "${latest_tag}" ./RichillCapital.SharedKernel.csproj
