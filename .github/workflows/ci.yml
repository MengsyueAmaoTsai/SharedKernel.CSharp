name: .NET Continuous Integration

on:
  push:
    branches:
      - master
      - dev

  pull_request:
    branches:
      - master
      - dev
env:
  CakeFilePath: ./build.cake
  Configuration: Debug
  Target: Default

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Nerdbank.GitVersioning to Set Version Variables
      uses: dotnet/nbgv@master
      id: nbgv

    - name: Update Version
      run: |
        sudo apt-get install -y xmlstarlet
        latest_tag=${{ steps.nbgv.outputs.SimpleVersion }}
        xmlstarlet ed --inplace -u "/Project/PropertyGroup/Version" -v "${latest_tag}" ./RichillCapital.SharedKernel.csproj
        
    - name: .NET Build and Test
      uses: cake-build/cake-action@v2
      with:
        script-path: ${{ env.CakeFilePath }}
        target: ${{ env.Target }}
        verbosity: Diagnostic
        arguments: |
          configuration: ${{ env.Configuration }}
      
    - name: Upload Artifact
      uses: actions/upload-artifact@v2
      with:
        name: RichillCapital.Domain-${{ steps.nbgv.outputs.SimpleVersion }}-${{ env.Configuration }}
        path: ./artifacts          